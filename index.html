<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Image Scanner (zxing-wasm 3.0.3 iife)</title>
  <style>
    body {
        font-family: sans-serif;
        margin: 0;
        padding: 10px;
        background-color: #f9f9f9;
      }
    
    .hidden { display: none; }
    .visible { display: block; }
    
    video { width: 100%; 
            max-width: 800px;
            display: block;
      }
    
    canvas { 
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          max-width: 800px;
          pointer-events: none; /* ← クリックを通す */
      }

    .button-container{
        display: flex;
        justify-content: center; 
      }

    button {
        width: 100%;
        padding: 12px;
        margin: 10px;
        font-size: 1rem;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
    
    #result {
        margin-top: 12px;
        text-align: center;
        font-weight: bold;
        font-size: 1rem;
      }
  </style>
</head>
<body>
  <h1>一括読み取りアプリ</h1>
  
  <button id="startBtn">カメラ開始</button>
  <div id="result">結果: まだ読み取っていません</div>

  <div id="camera-area" class="hidden" style="position: relative; width:100%; max-width:800px;">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
  </div>


  <div class="button-container">
    <button id="stopBtn">停止</button>
    <button id="restartBtn">再開</button>
    <button id="searchBtn" hidden>探す（連続スキャン）</button>
    
  </div>

  <!-- ZXing WASM -->
  <script src="https://cdn.jsdelivr.net/npm/zxing-wasm@3.0.3/dist/iife/reader/index.min.js"></script>

  <script>
    const { readBarcodesFromImageData, getZXingModule } = ZXingWASM;

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const restartBtn  = document.getElementById("restartBtn");
    const searchBtn = document.getElementById("searchBtn");
    
    const video    = document.getElementById("video");
    const canvas   = document.getElementById("canvas");
    const resultEl = document.getElementById("result");

    // let stream = null;

    // let targetCode = null;   // 登録したコード
    let searchMode = false;  // 探すモード
    let scanning = false;    // 連続スキャン中かどうか
    let stopRequested = false; // ループを停止させるフラグ


    getZXingModule().then(() => console.log("ZXing ready"));

    // カメラ開始
    startBtn.addEventListener("click", async () => {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment",
                 width: { ideal: 1920 },
                 height: { ideal: 1080 }
               }
      });
      video.srcObject = stream;
      await video.play();
      searchBtn.disabled = false;
      const target = document.getElementById("camera-area");
      target.classList.toggle("visible"); // クラスを切り替え
      scanning = true;
      continuousScan();
    });

    
    
    // ★ 読み取ったコード（重複なし）
    const scannedCodes = new Set();
    
    // ★ 読み取ったコードの枠（毎フレーム描画用）
    const scannedBoxes = new Map(); // text → position
    
    async function continuousScan() {
      if ( stopRequested) return;
    
      const w = video.videoWidth;
      const h = video.videoHeight;
    
      canvas.width = w;
      canvas.height = h;
    
      const ctx = canvas.getContext("2d");
      // ★ 再描画させるためにcanvas をクリア
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(video, 0, 0, w, h);
      
      
      const imageData = ctx.getImageData(0, 0, w, h);
    
      // ★ 毎フレームスキャン（重複は Set が防ぐ）
      const results = await readBarcodesFromImageData(imageData, {
        formats: ["MicroQRCode", "QRCode"]    // zxing-wasmはcodabarとITFの一括読み取りが苦手なので二次元コードのみ
      });
      
      
      // ★ scannedBoxes を毎フレーム消さない（ここが重要）
      if (results.length > 0) {
        for (const r of results) {
          const text = r.text;
    
          // 新規コードなら Set に追加
          scannedCodes.add(text);
    
          // ★ 新規コードでなくても毎フレーム位置を更新
          highlightBox = r.position || "center";
          if (r.position) {
            ctx.strokeStyle = "red";
            ctx.lineWidth = 8;

            //scannedBoxes.set(text, r.position);

            if (highlightBox !== "center") {
              const box = highlightBox;
            
              // ZXing が枠を返した場合
              ctx.beginPath();
              ctx.moveTo(box.topLeft.x, box.topLeft.y);
              ctx.lineTo(box.topRight.x, box.topRight.y);
              ctx.lineTo(box.bottomRight.x, box.bottomRight.y);
              ctx.lineTo(box.bottomLeft.x, box.bottomLeft.y);
              ctx.closePath();
              ctx.stroke();

              // ★ 枠の下にテキストを描く
              ctx.font = "48px sans-serif";
              ctx.strokeStyle = "black";
              ctx.strokeText(r.text, box.topLeft.x, box.bottomLeft.y + 30);
              ctx.fillStyle = "yellow";
              ctx.fillText(r.text, box.topLeft.x, box.bottomLeft.y + 30);
              
            } else {
              // ZXing が枠を返さないフォーマット用（ITF / Codabar）
              ctx.strokeRect(w * 0.2, h * 0.2, w * 0.6, h * 0.6);

              // 中央枠の下にテキストを描く
              ctx.font = "48px sans-serif";
              ctx.strokeStyle = "black";
              ctx.strokeText(r.text, w * 0.2, h * 0.2 + (h * 0.6) + 30);
              ctx.fillStyle = "yellow";
              ctx.fillText(r.text, w * 0.2, h * 0.2 + (h * 0.6) + 30);
              
            }
          }
          
        }
      }
      // ★ 読み取ったすべての枠を毎フレーム描画
      //drawAllBoxes(ctx);
    
      // ★ 状態表示
      resultEl.textContent =
        "読み取り済み: " + Array.from(scannedCodes).join(", ");
    
      requestAnimationFrame(continuousScan);
    }
    
    // ★ 読み取った枠を毎フレーム描画
    function drawAllBoxes(ctx) {

    
      for (const [text, box] of scannedBoxes.entries()) {
        if (!box) continue;
    
        ctx.beginPath();
        ctx.moveTo(box.topLeft.x, box.topLeft.y);
        ctx.lineTo(box.topRight.x, box.topRight.y);
        ctx.lineTo(box.bottomRight.x, box.bottomRight.y);
        ctx.lineTo(box.bottomLeft.x, box.bottomLeft.y);
        ctx.closePath();
        ctx.stroke();
      }
    }

    // イメージの読取を停止させる
    stopBtn.addEventListener("click", () => {
      stopRequested = true;
      scanning = false;     // 連続スキャン停止
      searchMode = false;

      // ★ canvas をクリア
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      resultEl.textContent = "停止しました";
    });

    //　読取の再開
    restartBtn.addEventListener("click", () => {
      stopRequested = false;
      scanning = true;
      scannedCodes.clear();
      scannedBoxes.clear();
      
      continuousScan();
    });


  </script>
</body>
</html>
